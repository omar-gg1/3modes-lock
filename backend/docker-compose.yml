# Smart Lock — Mode 2 (Hybrid) backend stack.
#
# Four services, identical locally and on the AWS EC2 host:
#   mosquitto  : MQTT broker the ESP32 publishes access events to (auth required)
#   mysql      : stores the events (the DB behind phpMyAdmin)
#   api        : FastAPI — subscribes to events, writes them to MySQL, serves REST
#   phpmyadmin : web GUI to browse the MySQL data
#
# Secrets come from a gitignored .env file (see .env.example). Bring it up with:
#   docker compose up -d --build
#
# Ports (lock down 8080/8000/1883 in the AWS security group — see README):
#   1883 MQTT | 8000 REST API | 8080 phpMyAdmin | 3306 MySQL (internal only)

services:
  mosquitto:
    # Built from mosquitto/Dockerfile so the config + password file are baked in
    # with correct ownership (a bind-mounted passwd from Windows is world-readable
    # and Mosquitto 2.x rejects it). Rebuild after changing the passwd/conf.
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    container_name: smartlock-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: smartlock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # NOTE: 3306 is intentionally NOT published to the host — only the other
    # containers reach MySQL over the internal compose network. Never expose it.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: smartlock-api
    ports:
      - "8000:8000"
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_EVENT_TOPIC: "smartlock/+/events"
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
      # Nixis control plane — command signing, JWT login (must match firmware).
      MQTT_ACK_TOPIC: "smartlock/+/acks"
      CMD_HMAC_SECRET: ${CMD_HMAC_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      NIXIS_USER: ${NIXIS_USER}
      NIXIS_PASSWORD: ${NIXIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: smartlock-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Mode 3 cloud verifier (ArcFace). Its OWN container so a heavy/slow model
  # can't take down the Mode 2 event pipeline. Shares the same MySQL.
  verifier:
    build:
      context: ./verifier
      dockerfile: Dockerfile
    container_name: smartlock-verifier
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
      VERIFIER_API_KEY: ${VERIFIER_API_KEY}
      INSIGHTFACE_MODEL: ${INSIGHTFACE_MODEL:-buffalo_l}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD:-0.40}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mosquitto_data:
  mysql_data:
