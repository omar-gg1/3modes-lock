# PRODUCTION compose for the EC2 host — pulls pre-built images from GHCR
# instead of building locally (the CI builds & pushes them). Secrets come from
# a server-side .env that is NEVER committed (see .env.example + SETUP-AWS.md).
#
# IMAGE_PREFIX must be set in the server .env, e.g.:
#   IMAGE_PREFIX=ghcr.io/omar-gg1/3modes-lock
#
# Deploy:  docker compose -f docker-compose.prod.yml pull && up -d

services:
  mosquitto:
    # Base image + server-side config/passwd mounted from ~/smartlock/mosquitto/
    # (generated on the EC2 host by setup — the passwd is a secret, never in git
    # or an image). On Linux the mounted passwd gets correct perms, so no custom
    # image is needed here (unlike the Windows-dev build).
    image: eclipse-mosquitto:2
    container_name: smartlock-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: smartlock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    image: ${IMAGE_PREFIX}-api:latest
    container_name: smartlock-api
    ports:
      - "8000:8000"
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_EVENT_TOPIC: "smartlock/+/events"
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: smartlock-phpmyadmin
    ports:
      # Host port 8091 (not 8080): 8080 is a well-known proxy port that many
      # ISPs/networks filter outbound, which made phpMyAdmin unreachable from
      # some browsers. 8091 avoids that. Open 8091 in the EC2 security group.
      - "8091:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # Mode 3 cloud verifier (ArcFace) — pulled from GHCR, its own container so it
  # can't affect the Mode 2 pipeline. Heavy on CPU/RAM; watch memory on a small
  # instance (add swap or resize if it OOMs).
  verifier:
    image: ${IMAGE_PREFIX}-verifier:latest
    container_name: smartlock-verifier
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
      VERIFIER_API_KEY: ${VERIFIER_API_KEY}
      INSIGHTFACE_MODEL: ${INSIGHTFACE_MODEL:-buffalo_l}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD:-0.40}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mosquitto_data:
  mysql_data:
