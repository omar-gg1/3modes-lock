# Mosquitto broker config for the Smart Lock Mode 2 (Hybrid) backend.
#
# Dev-only settings: anonymous access is allowed so the ESP32 and the FastAPI
# subscriber can connect without credentials while we build. For the AWS demo
# we lock this down (TLS + username/password) — see backend/README.md.

listener 1883
allow_anonymous true

# Persist retained messages / subscriptions across broker restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` shows broker activity.
log_dest stdout
log_type all
