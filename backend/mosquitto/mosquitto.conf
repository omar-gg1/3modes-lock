# Mosquitto broker config for the Smart Lock Mode 2 (Hybrid) backend.
#
# AUTH REQUIRED: the broker runs on a public EC2 IP, so anonymous access is OFF.
# Both the ESP32 firmware and the FastAPI subscriber must present the username +
# password from the passwd file. Create it (see README) with:
#   docker run --rm -v "$PWD/mosquitto:/m" eclipse-mosquitto:2 \
#     mosquitto_passwd -b -c /m/passwd <user> <password>
# TLS (mqtts:// on 8883) is the next hardening step — see README.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# Persist retained messages / subscriptions across broker restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` shows broker activity.
log_dest stdout
log_type all
